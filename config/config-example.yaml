# DiegoC Agent Configuration Example
#
# Configuration File Locations (in priority order):
# 1) ./config/config.yaml - Development (current directory)
# 2) ~/.diegoc-agent/config/config.yaml - User config directory
# 3) Executable directory /config/config.yaml
#
# Copy to config.yaml and fill in your API key.

# ===== LLM Configuration =====
api_key: "YOUR_API_KEY_HERE"
# api_base: "https://api.minimax.io"   # Global
api_base: "https://api.minimaxi.com"   # China
model: "MiniMax-M2.5"
provider: "anthropic"  # anthropic or openai

# ===== Retry Configuration =====
retry:
  enabled: true
  max_retries: 3
  initial_delay: 1.0
  max_delay: 60.0
  exponential_base: 2.0

# ===== Agent Configuration =====
max_steps: 100
workspace_dir: "./workspace"
system_prompt_path: "system_prompt.md"
token_limit: 80000  # trigger context summarization when exceeded

# ===== Tools Configuration =====
tools:
  enable_file_tools: true
  enable_bash: true
  enable_note: true
  enable_skills: true
  skills_dir: "./skills"
  enable_mcp: true
  mcp_config_path: "mcp.json"
  mcp:
    connect_timeout: 10.0
    execute_timeout: 60.0
    sse_read_timeout: 120.0
